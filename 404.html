<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>页面不存在</title>
  <style>
    :root{color-scheme:light}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif;background:#f6f8fb;color:#111827;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{width:min(560px,100%);background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:24px;padding:36px 28px;box-shadow:0 20px 60px rgba(15,23,42,.08);text-align:center}
    .code{display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:999px;background:#eef2ff;color:#4338ca;font-weight:800;font-size:13px;margin-bottom:16px}
    h1{margin:0 0 12px;font-size:32px;line-height:1.15}
    p{margin:0;color:#6b7280;line-height:1.8}
    .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px}
    a{display:inline-flex;align-items:center;justify-content:center;padding:11px 16px;border-radius:12px;text-decoration:none;font-weight:700}
    .primary{background:#111827;color:#fff}
    .secondary{background:#fff;color:#374151;border:1px solid rgba(15,23,42,.08)}
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>页面不存在</h1>
    <p>你访问的页面可能已经移动、改名，或者暂时不可用。</p>
    <div class="actions">
      <a class="primary" href="/">返回首页</a>
      <a class="secondary" href="javascript:history.back()">返回上一页</a>
    </div>
  </div>
</body>
</html>
