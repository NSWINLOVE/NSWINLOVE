<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POP 程序安装向导</title>
<style>
:root{--bg:#eef5ff;--card:#ffffff;--line:#dbeafe;--text:#0f172a;--muted:#64748b;--accent:#2563eb;--accent2:#38bdf8}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif;background:linear-gradient(180deg,#f3f8ff,#eaf2ff);color:var(--text)}
.wrap{max-width:960px;margin:0 auto;padding:32px 18px}
.hero{margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:34px}
.hero p{margin:0;color:var(--muted);line-height:1.8}
.grid{display:grid;grid-template-columns:1fr 1.1fr;gap:18px}
.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:26px;padding:22px;box-shadow:0 20px 50px rgba(15,23,42,.08)}
.card h2{margin:0 0 14px;font-size:22px}
.checks{display:grid;gap:10px}
.check{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:16px;background:#f8fbff;border:1px solid #e5efff}
.ok{color:#15803d;font-weight:800}
.bad{color:#dc2626;font-weight:800}
form{display:grid;gap:14px}
.group{display:grid;gap:8px}
.group label{font-size:13px;font-weight:800;color:#334155}
.group input{width:100%;min-height:48px;padding:0 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;color:#0f172a}
button{min-height:50px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 14px 30px rgba(37,99,235,.22)}
button:hover{opacity:.95}
.note{margin-top:14px;padding:14px 16px;border-radius:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;line-height:1.7}
@media (max-width:860px){.grid{grid-template-columns:1fr}.hero h1{font-size:28px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>POP 程序安装向导</h1>
    <p>给整个网站程序补一套可落地的安装页：环境检测、数据库配置、管理员初始化、安装锁定，一次装完即可进入前后台。</p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>环境检测</h2>
      <div class="checks">
        <div class="check"><span>PHP &gt;= 7.4</span><strong class="bad">失败</strong></div>
        <div class="check"><span>PDO 扩展</span><strong class="ok">通过</strong></div>
        <div class="check"><span>PDO MySQL 扩展</span><strong class="ok">通过</strong></div>
        <div class="check"><span>storage 目录可写</span><strong class="ok">通过</strong></div>
      </div>
    </div>

    <div class="card">
      <h2>安装配置</h2>
      <form>
        <div class="group"><label>数据库地址</label><input type="text" name="db_host" value="127.0.0.1"></div>
        <div class="group"><label>数据库名</label><input type="text" name="db_name" value=""></div>
        <div class="group"><label>数据库用户名</label><input type="text" name="db_user" value=""></div>
        <div class="group"><label>数据库密码</label><input type="text" name="db_pass" value=""></div>
        <div class="group"><label>管理员账号</label><input type="text" name="admin_user" value="admin"></div>
        <div class="group"><label>管理员密码</label><input type="text" name="admin_pass" value=""></div>
        <div class="group"><label>站点标题</label><input type="text" name="site_title" value="POP 官方下载"></div>
        <div class="group"><label>站点描述</label><input type="text" name="site_description" value="官方正版下载中心，提供最新版本与更新说明"></div>
        <div class="group"><label>后台入口目录</label><input type="text" name="admin_slug" value="admin"></div>
        <button type="button">开始安装程序</button>
      </form>
      <div class="note">这是按参考站点复刻的静态页面版本，用于展示安装界面样式；当前未接入真实安装逻辑、数据库写入和后台初始化。</div>
    </div>
  </div>
</div>
</body>
</html>
